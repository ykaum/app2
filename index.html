<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mahjong 4P Battle - Final Edition</title>
    <style>
        :root { --bg: #04140a; --table: #1a5a35; --accent: #ffcc00; --white: #fdfdfd; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: "Hiragino Mincho ProN", serif; overflow: hidden; height: 100vh; }
        
        #game-screen { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, var(--table) 0%, #051a10 100%); display: flex; align-items: center; justify-content: center; }

        /* --- 牌のデザイン --- */
        .tile { 
            width: 34px; height: 48px; background: #fff; border-radius: 4px; border: 1px solid #999; border-bottom: 5px solid #bbb;
            display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; box-shadow: 2px 2px 5px rgba(0,0,0,0.4);
        }
        .tile.hidden { background: linear-gradient(135deg, #3d7a55 0%, #1a3a2a 100%); border-bottom-color: #0d1a13; color: transparent; }
        .tile.dora { box-shadow: 0 0 15px var(--accent); border-color: var(--accent); }
        .tile.tsumo { margin-left: 10px; }

        .design { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2px; pointer-events: none; }
        .m-val { font-size: 20px; font-weight: 900; color: #d32f2f; line-height: 1; }
        .m-suit { font-size: 8px; color: #d32f2f; font-weight: bold; }
        .z-val { font-size: 22px; font-weight: 900; }
        .z-red { color: #d32f2f; } .z-green { color: #2e7d32; } .z-black { color: #222; }

        /* 筒子ドット */
        .p-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #1976d2; border: 1px solid rgba(0,0,0,0.1); }
        .dot.v1 { width: 20px; height: 20px; border: 3px double #fff; outline: 1px solid #1976d2; }
        .dot.red { background: #d32f2f; }

        /* 索子竹 */
        .s-box { display: flex; flex-wrap: wrap; gap: 1px; justify-content: center; width: 24px; }
        .bamboo { width: 4px; height: 14px; background: #2e7d32; border-radius: 1px; border: 1px solid #1b5e20; }
        .bamboo.red { background: #d32f2f; }

        /* --- レイアウト --- */
        .player-area { position: absolute; display: flex; flex-direction: column; align-items: center; }
        .south { bottom: 20px; width: 100%; }
        .north { top: 20px; transform: rotate(180deg); }
        .east { right: 20px; transform: rotate(-90deg); }
        .west { left: 20px; transform: rotate(90deg); }

        .river { display: grid; grid-template-columns: repeat(6, 20px); gap: 2px; width: 132px; height: 70px; margin: 10px; }
        .river .tile { width: 20px; height: 28px; border-bottom-width: 2px; cursor: default; }
        .river .m-val, .river .z-val { font-size: 12px; } .river .dot { width: 4px; height: 4px; } .river .dot.v1 { width: 10px; height: 10px; } .river .bamboo { width: 3px; height: 8px; }

        .hand { display: flex; gap: 2px; }
        .info-tag { background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 15px; font-size: 12px; margin-bottom: 5px; border: 1px solid transparent; }
        .active-turn { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* --- センターパネル --- */
        #center-panel { width: 140px; height: 110px; background: rgba(0,0,0,0.6); border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }

        /* --- ボタン --- */
        #controls { position: absolute; bottom: 160px; display: flex; gap: 8px; z-index: 100; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: #333; color: white; font-weight: bold; display: none; cursor: pointer; }
        button.show { display: block; background: #e67e22; }

        #msg-layer { position: fixed; font-size: 50px; font-weight: 900; color: white; text-shadow: 0 0 15px #000; pointer-events: none; z-index: 500; display: none; }
    </style>
</head>
<body>

<div id="game-screen">
    <div id="msg-layer"></div>
    <div id="center-panel">
        <div style="color:var(--accent); font-weight:bold; font-size:14px;">東 1 局</div>
        <div id="wall-count" style="font-size:12px; margin:5px 0;">山: 70</div>
        <div id="dora-area" style="display:flex; gap:2px;"></div>
    </div>

    <div id="controls">
        <button id="btn-riichi" onclick="onRiichi()">リーチ</button>
        <button id="btn-tsumo" onclick="onWin('TSUMO')">ツモ</button>
        <button id="btn-ron" onclick="onWin('RON')">ロン</button>
        <button id="btn-pass" onclick="onPass()">パス</button>
    </div>

    <div class="player-area north" id="area-2">
        <div class="hand" id="hand-2"></div>
        <div class="river" id="river-2"></div>
        <div class="info-tag" id="info-2">CPU 2: 25000</div>
    </div>
    <div class="player-area east" id="area-1">
        <div class="hand" id="hand-1"></div>
        <div class="river" id="river-1"></div>
        <div class="info-tag" id="info-1">CPU 1: 25000</div>
    </div>
    <div class="player-area west" id="area-3">
        <div class="hand" id="hand-3"></div>
        <div class="river" id="river-3"></div>
        <div class="info-tag" id="info-3">CPU 3: 25000</div>
    </div>
    <div class="player-area south" id="area-0">
        <div class="info-tag" id="info-0">YOU: 25000</div>
        <div class="river" id="river-0"></div>
        <div class="hand" id="hand-0"></div>
    </div>
</div>

<script>
/**
 * 完全版 麻雀ロジック: 4人対戦 & ランダム配牌
 */
const KANJI = ["", "一", "二", "三", "四", "五", "六", "七", "八", "九"];
const JIHAI = { "E":"東", "S":"南", "W":"西", "N":"北", "P":"白", "F":"發", "C":"中" };

let deck = [], players = [], turn = 0, dora = null, lastDiscard = null, isWaiting = false;

function initGame() {
    // 1. 山札(136枚)の生成
    deck = [];
    ['m','p','s'].forEach(c => { for(let v=1; v<=9; v++) for(let n=0; n<4; n++) deck.push({c, v}); });
    Object.keys(JIHAI).forEach(v => { for(let n=0; n<4; n++) deck.push({c:'z', v}); });
    
    // 2. 洗牌（フィッシャー・イェーツのシャッフル）
    for (let i = deck.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [deck[i], deck[j]] = [deck[j], deck[i]];
    }

    // 3. ドラ決定
    dora = deck.pop();
    document.getElementById('dora-area').innerHTML = createTileHTML(dora);

    // 4. プレイヤー初期化 & 配牌
    players = Array.from({length:4}, (_, i) => ({
        id: i, score: 25000, hand: [], river: [], riichi: false, isAI: i !== 0
    }));

    players.forEach(p => {
        p.hand = deck.splice(0, 13).sort(sortTiles);
    });

    startTurn();
}

function sortTiles(a, b) {
    if(a.c !== b.c) return a.c.localeCompare(b.c);
    return a.v.toString().localeCompare(b.v.toString());
}

function createTileHTML(tile, isHidden = false, isTsumo = false) {
    if(isHidden) return `<div class="tile hidden">?</div>`;
    let content = '';
    const tClass = isTsumo ? 'tsumo' : '';
    const dClass = (tile.c === dora.c && tile.v === dora.v) ? 'dora' : '';

    if (tile.c === 'm') {
        content = `<div class="design"><span class="m-val">${KANJI[tile.v]}</span><span class="m-suit">萬</span></div>`;
    } else if (tile.c === 'p') {
        let dots = '';
        for(let i=0; i<tile.v; i++) dots += `<div class="dot ${tile.v===1?'v1':''} ${(tile.v===5&&i===2)?'red':''}"></div>`;
        content = `<div class="design"><div class="p-grid" style="grid-template-columns:repeat(${tile.v===1?1:2},1fr)">${dots}</div></div>`;
    } else if (tile.c === 's') {
        let sticks = '';
        for(let i=0; i<tile.v; i++) sticks += `<div class="bamboo ${tile.v===1?'red':''}"></div>`;
        content = `<div class="design"><div class="s-box">${sticks}</div></div>`;
    } else if (tile.c === 'z') {
        let zColor = tile.v === 'F' ? 'z-green' : (tile.v === 'C' ? 'z-red' : 'z-black');
        content = `<div class="design" style="${tile.v==='P'?'border:1px solid #ddd;border-radius:2px;margin:2px':''}"><span class="z-val ${zColor}">${tile.v==='P'?'':JIHAI[tile.v]}</span></div>`;
    }
    return `<div class="tile ${tClass} ${dClass}">${content}</div>`;
}

function startTurn() {
    if(deck.length <= 14) return showMsg("流局");
    const p = players[turn];
    const t = deck.shift();
    p.hand.push(t);
    updateUI();

    if(!p.isAI) {
        // プレイヤーの番
        if(checkWin(p.hand)) document.getElementById('btn-tsumo').classList.add('show');
    } else {
        // AIの番: 1秒後に自動打牌
        setTimeout(() => {
            const idx = Math.floor(Math.random() * p.hand.length); // 簡易AI: ランダム打牌
            discard(p, idx);
        }, 1000);
    }
}

function discard(p, idx) {
    lastDiscard = p.hand.splice(idx, 1)[0];
    p.river.push(lastDiscard);
    p.hand.sort(sortTiles);
    updateUI();

    // ロン判定チェック（他プレイヤー）
    if(turn !== 0 && checkWin([...players[0].hand, lastDiscard])) {
        isWaiting = true;
        document.getElementById('btn-ron').classList.add('show');
        document.getElementById('btn-pass').classList.add('show');
        return;
    }

    turn = (turn + 1) % 4;
    startTurn();
}

function updateUI() {
    players.forEach(p => {
        const h = document.getElementById(`hand-${p.id}`);
        h.innerHTML = p.hand.map((t, i) => {
            const wrap = document.createElement('div');
            wrap.innerHTML = createTileHTML(t, p.isAI, i === p.hand.length-1);
            if(!p.isAI) wrap.firstChild.onclick = () => discard(p, i);
            return wrap.innerHTML;
        }).join('');

        document.getElementById(`river-${p.id}`).innerHTML = p.river.map(t => createTileHTML(t)).join('');
        document.getElementById(`info-${p.id}`).className = `info-tag ${turn === p.id ? 'active-turn' : ''}`;
    });
    document.getElementById('wall-count').innerText = `山: ${deck.length}`;
}

function checkWin(hand) {
    // 判定ロジック（デモ用に常にFalse、特定の役満条件などで拡張可能）
    return false; 
}

function showMsg(txt) {
    const m = document.getElementById('msg-layer');
    m.innerText = txt; m.style.display = 'block';
    setTimeout(() => m.style.display = 'none', 2000);
}

function onPass() {
    document.querySelectorAll('button').forEach(b => b.classList.remove('show'));
    turn = (turn + 1) % 4;
    startTurn();
}

initGame();
</script>
</body>
</html>
