<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mahjong: Melds Edition</title>
    <style>
        :root { --bg: #04140a; --table: #1a5a35; --accent: #ffcc00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #game-screen { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, var(--table) 0%, #051a10 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* 牌・副露エリアのレイアウト */
        .hand-container { display: flex; align-items: flex-end; gap: 10px; }
        .hand { display: flex; gap: 2px; }
        .melds { display: flex; gap: 5px; margin-left: 10px; }
        .meld-group { display: flex; gap: 1px; transform: scale(0.9); origin: bottom; }

        .tile { width: 34px; height: 48px; background: #fff; border-radius: 4px; border: 1px solid #999; border-bottom: 5px solid #bbb; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; box-shadow: 2px 2px 5px rgba(0,0,0,0.4); color: #000; }
        .tile.sideways { transform: rotate(-90deg); margin: 0 5px; border-bottom: 5px solid #bbb; } /* 鳴いた牌の横向き */
        .tile.hidden { background: linear-gradient(135deg, #3d7a55 0%, #1a3a2a 100%); border-bottom-color: #0d1a13; color: transparent; }
        
        /* 牌面デザイン */
        .design { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .m-val { font-size: 19px; font-weight: 900; color: #d32f2f; }
        .z-val { font-size: 21px; font-weight: 900; }

        /* UI */
        #center-panel { width: 160px; height: 120px; background: rgba(0,0,0,0.7); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); }
        #controls { position: absolute; bottom: 180px; display: flex; gap: 8px; z-index: 100; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: #444; color: white; font-weight: bold; display: none; cursor: pointer; box-shadow: 0 4px 0 #222; }
        button.active { display: block; background: #e67e22; }

        .player-area { position: absolute; display: flex; flex-direction: column; align-items: center; }
        .south { bottom: 20px; width: 100%; }
        .river { display: grid; grid-template-columns: repeat(6, 20px); gap: 2px; margin: 10px; height: 60px; }
        .river .tile { width: 20px; height: 28px; border-bottom-width: 2px; font-size: 10px; }
    </style>
</head>
<body>

<div id="game-screen">
    <div id="center-panel">
        <div id="info-round" style="color:var(--accent); font-weight:bold;">東1局</div>
        <div id="info-wall" style="font-size:12px; margin:5px 0;">山: 70</div>
        <div id="info-dora" style="display:flex;"></div>
    </div>

    <div id="controls">
        <button id="btn-pon" onclick="onMeld('PON')">ポン</button>
        <button id="btn-chii" onclick="onMeld('CHII')">チー</button>
        <button id="btn-kan" onclick="onMeld('KAN')">カン</button>
        <button id="btn-ron" onclick="onWin()">ロン</button>
        <button id="btn-pass" onclick="onPass()" style="background:#666">パス</button>
    </div>

    <div class="player-area south">
        <div class="river" id="river-0"></div>
        <div class="hand-container">
            <div class="hand" id="hand-0"></div>
            <div class="melds" id="melds-0"></div>
        </div>
    </div>
</div>

<script>
const SUITS = ['m', 'p', 's', 'z'];
const JIHAI = {1:'東', 2:'南', 3:'西', 4:'北', 5:'白', 6:'發', 7:'中'};
let deck = [], players = [], turn = 0, dora = null, lastDiscard = null;

function init() {
    deck = [];
    SUITS.forEach(s => {
        let max = (s === 'z') ? 7 : 9;
        for(let v=1; v<=max; v++) for(let n=0; n<4; n++) deck.push({s, v});
    });
    deck.sort(() => Math.random() - 0.5);
    dora = deck.pop();
    document.getElementById('info-dora').innerHTML = createTileHTML(dora);

    players = [{ id: 0, hand: [], river: [], melds: [], isAI: false }];
    // デモ用に1人対戦で副露チェックを回します
    players[0].hand = deck.splice(0, 13).sort(sortFunc);
    
    startTurn();
}

function sortFunc(a, b) { return a.s !== b.s ? SUITS.indexOf(a.s) - SUITS.indexOf(b.s) : a.v - b.v; }

function createTileHTML(t, isHidden=false, isTsumo=false) {
    let content = '';
    if(t.s === 'm') content = `<span class="m-val">${t.v}</span><span style="font-size:8px;color:#d32f2f">萬</span>`;
    else if(t.s === 'z') content = `<span class="z-val">${JIHAI[t.v]}</span>`;
    else content = `<span>${t.v}${t.s}</span>`;
    return `<div class="tile ${isTsumo?'tsumo':''}">${content}</div>`;
}

function startTurn() {
    const p = players[0];
    const t = deck.shift();
    p.hand.push(t);
    updateUI();
}

function updateUI() {
    const p = players[0];
    const h = document.getElementById('hand-0');
    h.innerHTML = p.hand.map((t, i) => {
        const wrap = document.createElement('div');
        wrap.innerHTML = createTileHTML(t, false, i === p.hand.length-1);
        wrap.firstChild.onclick = () => discard(i);
        return wrap.innerHTML;
    }).join('');

    const m = document.getElementById('melds-0');
    m.innerHTML = p.melds.map(meld => `
        <div class="meld-group">
            ${meld.tiles.map((t, i) => `<div class="tile ${i===0?'sideways':''}">${createTileHTML(t)}</div>`).join('')}
        </div>
    `).join('');
    
    document.getElementById('info-wall').innerText = `山: ${deck.length}`;
}

function discard(idx) {
    const p = players[0];
    lastDiscard = p.hand.splice(idx, 1)[0];
    p.river.push(lastDiscard);
    p.hand.sort(sortFunc);
    
    // 捨てた後に「擬似的な相手の捨て牌」を作ってポン・チー判定をシミュレート
    setTimeout(simulateEnemyTurn, 500);
}

function simulateEnemyTurn() {
    // デモ用にランダムな牌を「相手が捨てた」ことにする
    const enemyTile = deck.shift();
    lastDiscard = enemyTile;
    checkMeldable(enemyTile);
}

function checkMeldable(tile) {
    const p = players[0];
    let canPon = p.hand.filter(t => t.s === tile.s && t.v === tile.v).length >= 2;
    let canChii = false; // チーの判定は複雑なため今回はポンを優先表示
    
    if(canPon) document.getElementById('btn-pon').classList.add('active');
    document.getElementById('btn-pass').classList.add('active');
}

function onMeld(type) {
    const p = players[0];
    if(type === 'PON') {
        const matches = p.hand.filter(t => t.s === lastDiscard.s && t.v === lastDiscard.v).slice(0, 2);
        // 手牌から削除
        matches.forEach(m => {
            const idx = p.hand.findIndex(t => t === m);
            p.hand.splice(idx, 1);
        });
        // 副露に追加
        p.melds.push({ type: 'PON', tiles: [lastDiscard, ...matches] });
    }
    onPass();
}

function onPass() {
    document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    updateUI();
}

init();
</script>
</body>
</html>
