<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gomoku Grandmaster AI</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --board-color: #d4a373;
            --line-color: #432818;
            --accent-color: #f43f5e;
            --black-grad: radial-gradient(circle at 30% 30%, #444, #000);
            --white-grad: radial-gradient(circle at 30% 30%, #fff, #cbd5e1);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        #confetti-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }

        .header {
            text-align: center;
            z-index: 10;
            margin-bottom: 15px;
            color: white;
        }

        .difficulty-badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--accent-color);
            padding: 2px 10px;
            border-radius: 10px;
            margin-bottom: 5px;
            display: inline-block;
        }

        .status {
            font-size: 1.2rem;
            font-weight: 800;
            padding: 8px 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            min-width: 220px;
        }

        .board-container {
            position: relative;
            width: min(94vw, 460px);
            height: min(94vw, 460px);
            background-color: var(--board-color);
            border-radius: 4px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            border: 8px solid #997b59;
        }

        .board-container::before {
            content: "";
            position: absolute;
            top: calc(100%/30); left: calc(100%/30);
            right: calc(100%/30); bottom: calc(100%/30);
            background-image: 
                linear-gradient(var(--line-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--line-color) 1px, transparent 1px);
            background-size: calc(100%/14) calc(100%/14);
            border: 1px solid var(--line-color);
            pointer-events: none;
        }

        .cell {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .piece {
            width: 82%;
            height: 82%;
            border-radius: 50%;
            transform: scale(0);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
        }

        .piece.black { background: var(--black-grad); transform: scale(1); }
        .piece.white { background: var(--white-grad); transform: scale(1); }

        .piece.last-move {
            border: 2px solid var(--accent-color);
        }

        .piece.win-highlight {
            animation: pulse 0.5s infinite alternate;
            box-shadow: 0 0 20px #fff;
        }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        .controls { margin-top: 20px; }
        .reset-btn {
            padding: 12px 35px;
            font-size: 1rem;
            font-weight: bold;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .reset-btn:hover { background: #e2e8f0; }

        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="header">
        <div class="difficulty-badge">Difficulty: God Level</div>
        <div class="status" id="status">Your Turn (Black)</div>
    </div>

    <div class="board-container" id="board"></div>

    <div class="controls">
        <button class="reset-btn" onclick="resetGame()">RESET GAME</button>
    </div>

    <script>
        const SIZE = 15;
        let board = Array(SIZE).fill().map(() => Array(SIZE).fill(null));
        let isGameOver = false;
        let isCpuThinking = false;

        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');

        function init() {
            boardEl.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.onclick = () => playerMove(r, c);
                    boardEl.appendChild(cell);
                }
            }
            resize();
        }

        function playerMove(r, c) {
            if (board[r][c] || isGameOver || isCpuThinking) return;
            
            makeMove(r, c, 'black');
            const winLine = checkWin(r, c, 'black');
            if (winLine) return endGame("Victory!", winLine);

            isCpuThinking = true;
            statusEl.innerText = "AI Calculating...";
            setTimeout(cpuMove, 400);
        }

        function cpuMove() {
            let bestScore = -Infinity;
            let bestMoves = [];

            // 全マス評価（簡易的なMinimaxの思想を取り入れた評価関数）
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (!board[r][c]) {
                        let score = evaluateCell(r, c);
                        if (score > bestScore) {
                            bestScore = score;
                            bestMoves = [{r, c}];
                        } else if (score === bestScore) {
                            bestMoves.push({r, c});
                        }
                    }
                }
            }

            const move = bestMoves[Math.floor(Math.random() * bestMoves.length)];
            makeMove(move.r, move.c, 'white');

            const winLine = checkWin(move.r, move.c, 'white');
            if (winLine) {
                endGame("AI Overlord Wins", winLine);
            } else {
                statusEl.innerText = "Your Turn";
                isCpuThinking = false;
            }
        }

        function evaluateCell(r, c) {
            // 重み付け（最強設定）
            // 自分が5連 > 相手の5連阻止 > 自分の活4 > 相手の活4阻止 > ...
            const myScore = analyzeLine(r, c, 'white');
            const oppScore = analyzeLine(r, c, 'black');

            // 攻撃と守備のバランスを最適化
            // 相手の4連は絶対に阻止しなければならない
            return (myScore * 1.2) + oppScore; 
        }

        function analyzeLine(r, c, type) {
            const directions = [[0,1],[1,0],[1,1],[1,-1]];
            let total = 0;

            for (let [dr, dc] of directions) {
                let count = 1;
                let openEnds = 0;
                let blockedEnds = 0;

                for (let s of [1, -1]) {
                    let nr = r + dr*s, nc = c + dc*s;
                    while(nr>=0 && nr<SIZE && nc>=0 && nc<SIZE && board[nr][nc] === type) {
                        count++; nr += dr*s; nc += dc*s;
                    }
                    if(nr>=0 && nr<SIZE && nc>=0 && nc<SIZE && board[nr][nc] === null) openEnds++;
                    else blockedEnds++;
                }

                // 評価エンジンの心臓部
                if (count >= 5) total += 1000000; // 勝ち確定
                else if (count === 4) {
                    if (openEnds === 2) total += 100000; // 活4
                    else if (openEnds === 1) total += 5000; // 棒4
                }
                else if (count === 3) {
                    if (openEnds === 2) total += 5000; // 活3
                    else if (openEnds === 1) total += 500;
                }
                else if (count === 2) {
                    if (openEnds === 2) total += 100;
                }
            }
            return total;
        }

        function makeMove(r, c, type) {
            board[r][c] = type;
            document.querySelectorAll('.last-move').forEach(el => el.classList.remove('last-move'));
            const cell = boardEl.children[r * SIZE + c];
            const p = document.createElement('div');
            p.className = `piece ${type} last-move`;
            cell.appendChild(p);
        }

        function checkWin(r, c, type) {
            const directions = [[0,1],[1,0],[1,1],[1,-1]];
            for (let [dr, dc] of directions) {
                let line = [{r, c}];
                for (let s of [1, -1]) {
                    let nr = r + dr*s, nc = c + dc*s;
                    while(nr>=0 && nr<SIZE && nc>=0 && nc<SIZE && board[nr][nc] === type) {
                        line.push({r: nr, c: nc});
                        nr += dr*s; nc += dc*s;
                    }
                }
                if (line.length >= 5) return line;
            }
            return null;
        }

        function endGame(msg, winLine) {
            isGameOver = true;
            statusEl.innerText = msg;
            winLine.forEach(pos => {
                boardEl.children[pos.r * SIZE + pos.c].firstChild.classList.add('win-highlight');
            });

            if (msg === "Victory!") {
                startConfetti();
                boardEl.classList.add('shake');
            }
        }

        // --- Confetti ---
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        function startConfetti() {
            particles = Array.from({length:150}, () => ({
                x: Math.random()*canvas.width, y: -20,
                s: Math.random()*6+4, c: `hsl(${Math.random()*360}, 80%, 60%)`,
                v: {x: Math.random()*4-2, y: Math.random()*5+2},
                r: Math.random()*360, rv: Math.random()*10-5
            }));
            loop();
        }
        function loop() {
            if (!isGameOver) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => {
                p.x += p.v.x; p.y += p.v.y; p.r += p.rv;
                if(p.y > canvas.height) p.y = -20;
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r * Math.PI/180);
                ctx.fillStyle = p.c; ctx.fillRect(-p.s/2, -p.s/2, p.s, p.s); ctx.restore();
            });
            requestAnimationFrame(loop);
        }

        function resetGame() {
            board = Array(SIZE).fill().map(() => Array(SIZE).fill(null));
            isGameOver = false; isCpuThinking = false;
            statusEl.innerText = "Your Turn (Black)";
            ctx.clearRect(0,0,canvas.width,canvas.height);
            init();
        }

        init();
    </script>
</body>
</html>
